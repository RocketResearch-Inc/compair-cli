version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: core/Dockerfile.api
    image: compair/core-api:dev
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      - redis
      - db
      - model
      - ocr
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/_operator/healthz"]
      interval: 10s
      timeout: 2s
      retries: 12

  worker:
    build:
      context: ../..
      dockerfile: core/Dockerfile.api
    image: compair/core-worker:dev
    command: ["sh", "-lc", "echo worker ready; sleep infinity"]
    env_file:
      - .env
    depends_on:
      - redis
      - db
      - ocr

  model:
    build:
      context: ../..
      dockerfile: core/Dockerfile.model-cpu
    image: compair/core-model-cpu:dev
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/docs"]
      interval: 10s
      timeout: 2s
      retries: 12

  ocr:
    build:
      context: ../..
      dockerfile: core/Dockerfile.ocr
    image: compair/core-ocr:dev
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9001/docs"]
      interval: 10s
      timeout: 2s
      retries: 12

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=compair
      - POSTGRES_USER=compair
      - POSTGRES_PASSWORD=compair
    ports: ["5432:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
