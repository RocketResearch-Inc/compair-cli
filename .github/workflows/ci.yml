name: CI
on:
  push:
    branches:
      - "main"
  pull_request:
jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.24.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "${{ matrix.go }}"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: Smoke test offline demo
        run: |
          go run . demo --offline
          go run . demo --mode offline
      - name: Vet
        run: go vet ./...
  release-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - name: GoReleaser config check
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
