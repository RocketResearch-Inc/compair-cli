project_name: compair
before:
  hooks:
    - go mod tidy
builds:
  - id: compair
    main: .
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X github.com/RocketResearch-Inc/compair-cli/cmd/compair.Version={{.Version}}
      - -X github.com/RocketResearch-Inc/compair-cli/cmd/compair.Commit={{.Commit}}
      - -X github.com/RocketResearch-Inc/compair-cli/cmd/compair.BuildDate={{ .Date }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    binary: compair
archives:
  - format: tar.gz
    files:
      - LICENSE
      - README.md
      - docs/**
    format_overrides:
      - goos: windows
        format: zip
    replacements:
      darwin: macOS
checksum:
  name_template: "checksums.txt"
changelog:
  use: github
release:
  draft: false
  prerelease: auto
